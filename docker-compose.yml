# =============================================
# BoutiqueKi — Docker Compose (Production)
# =============================================
# Usage: docker-compose up -d

version: "3.9"

services:
  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boutiqueki-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - boutiqueki-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Frontend SPA (Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    container_name: boutiqueki-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - boutiqueki-network

networks:
  boutiqueki-network:
    driver: bridge
    name: boutiqueki-network
