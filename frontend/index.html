<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>BoutiqueKi — Créez votre boutique en ligne</title>
    <meta name="description" content="BoutiqueKi : la marketplace qui connecte les meilleures boutiques avec leurs clients. Créez votre boutique en ligne ou découvrez des produits uniques." />
    <!-- Open Graph defaults (overridden per-page by setSEO) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BoutiqueKi" />
    <meta property="og:title" content="BoutiqueKi — Créez votre boutique en ligne" />
    <meta property="og:description" content="La marketplace qui connecte les meilleures boutiques avec leurs clients." />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (function() {
        // Light by default; dark only when the user opted in.
        if (localStorage.theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
